<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Тренажёр - Безопасный ремонт? ВСЕГДА!!!</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a4d2a 0%, #0e3a1f 100%);
            padding: 15px;
            height: 100%;
        }
        .container {
            max-width: 1400px;
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 25px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .top-panel {
            background: #1a4d2a;
            color: white;
            padding: 12px 20px;
            text-align: center;
            flex-shrink: 0;
        }
        .top-panel h1 { font-size: 1.2rem; margin-bottom: 5px; }
        .top-panel p { font-size: 0.75rem; opacity: 0.9; }
        .score-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .badge {
            display: inline-block;
            padding: 4px 15px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.75rem;
        }
        .mode-badge { background: #ff9800; color: white; }
        .status-badge { background: #ffcc00; color: #1a4d2a; }
        .points-badge { background: #2196f3; color: white; }
        
        .accordion-area {
            background: #f8f9fa;
            border-bottom: 2px solid #ffcc00;
            flex-shrink: 0;
            max-height: 200px;
            overflow-y: auto;
        }
        .accordion-item { border-bottom: 1px solid #ddd; }
        .accordion-header {
            background: #e8f0e5;
            padding: 10px 15px;
            cursor: pointer;
            font-weight: bold;
            color: #1a4d2a;
            font-size: 0.85rem;
        }
        .accordion-header:hover { background: #d4e0d0; }
        .accordion-header::before { content: "▶ "; }
        .accordion-item.active .accordion-header::before { content: "▼ "; }
        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            background: white;
            padding: 0 15px;
        }
        .accordion-item.active .accordion-content {
            max-height: 300px;
            padding: 10px 15px;
        }
        .node-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .node-btn {
            background: #e8f0e5;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: bold;
        }
        .node-btn.active { background: #ffcc00; color: #1a4d2a; }
        .node-btn.completed { background: #4caf50; color: white; }
        
        .bottom-area { display: flex; flex: 1; min-height: 0; overflow: hidden; }
        .left-column {
            flex: 1;
            background: #f8f9fa;
            padding: 15px;
            border-right: 3px solid #ffcc00;
            display: flex;
            flex-direction: column;
            min-width: 0;
            min-height: 0;
            overflow: hidden;
        }
        .left-column h2 { font-size: 1rem; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid #ffcc00; flex-shrink: 0; }
        .steps-container { overflow-y: auto; flex: 1; min-height: 0; display: flex; flex-direction: column; gap: 8px; }
        .step-row { display: flex; align-items: center; gap: 10px; background: white; border-radius: 10px; padding: 8px 12px; flex-shrink: 0; }
        .step-number {
            width: 32px; height: 32px; background: #1a4d2a; color: #ffcc00;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1rem; flex-shrink: 0;
        }
        .drop-zone {
            flex: 1; min-height: 42px; background: #e9ecef; border-radius: 8px;
            padding: 6px 10px; border: 1px dashed #adb5bd; font-size: 0.75rem;
        }
        .drop-zone.drag-over { background: #ffcc00; }
        .drop-zone.filled-correct { background: #d4edda; border: 1px solid #4caf50; }
        .drop-zone.filled-wrong { background: #f8d7da; border: 1px solid #f44336; }
        .drop-zone.filled-neutral { background: #e9ecef; border: 1px solid #adb5bd; }
        .remove-btn { background: #dc3545; color: white; border: none; border-radius: 15px; padding: 2px 8px; margin-left: 8px; cursor: pointer; font-size: 0.65rem; }
        
        .right-column {
            flex: 1; background: white; padding: 15px;
            display: flex; flex-direction: column; min-width: 0; min-height: 0; overflow: hidden;
        }
        .right-column h2 { font-size: 1rem; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid #ffcc00; flex-shrink: 0; }
        .answers-container { overflow-y: auto; flex: 1; min-height: 0; display: flex; flex-direction: column; gap: 8px; }
        .answer-card {
            background: #e8f0e5; padding: 8px 12px; border-radius: 10px;
            border-left: 4px solid #ffcc00; font-size: 0.75rem; cursor: grab; flex-shrink: 0;
        }
        .answer-card:active { cursor: grabbing; }
        .answer-card.dragging { opacity: 0.4; }
        .answer-card.used { background: #c8e6c9; opacity: 0.6; text-decoration: line-through; cursor: default; }
        
        .control-panel {
            background: #f1f3f5; padding: 10px; display: flex; gap: 10px;
            justify-content: center; border-top: 1px solid #dee2e6; flex-wrap: wrap; flex-shrink: 0;
        }
        .btn { padding: 6px 16px; border: none; border-radius: 30px; font-weight: bold; font-size: 0.8rem; cursor: pointer; }
        .btn-check { background: #4caf50; color: white; }
        .btn-reset { background: #ff9800; color: white; }
        .btn-shuffle { background: #2196f3; color: white; }
        .btn-mode { background: #9c27b0; color: white; }
        .btn-back { background: #607d8b; color: white; text-decoration: none; display: inline-block; line-height: 32px; padding: 6px 16px; border-radius: 30px; }
        
        .message-area { padding: 6px 15px; text-align: center; font-size: 0.75rem; flex-shrink: 0; max-height: 70px; overflow-y: auto; }
        .message-success { background: #d4edda; color: #155724; }
        .message-error { background: #f8d7da; color: #721c24; }
        .correct-sequence { background: #e3f2fd; margin-top: 5px; padding: 6px; border-radius: 8px; font-size: 0.7rem; text-align: left; }
        
        @media (max-width: 900px) {
            .bottom-area { flex-direction: column; }
            .left-column { border-right: none; border-bottom: 2px solid #ffcc00; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="top-panel">
        <h1>🎮 ТРЕНАЖЁР ПО БЕЗОПАСНОСТИ</h1>
        <p>Выберите узел → перетащите действия в правильной последовательности</p>
        <div class="score-container">
            <div class="badge mode-badge" id="modeBadge">🎯 РЕЖИМ: ТРЕНИРОВКА</div>
            <div class="badge status-badge" id="statusBadge">⚡ Статус: не пройден</div>
            <div class="badge points-badge" id="pointsBadge">⭐ Баллы: 0</div>
        </div>
    </div>
    
    <div class="accordion-area">
        <div class="accordion-item active">
            <div class="accordion-header">📋 ВЫБОР УЗЛА ДЛЯ ТЕСТИРОВАНИЯ</div>
            <div class="accordion-content">
                <div class="node-list" id="nodeList"></div>
            </div>
        </div>
    </div>
    
    <div class="bottom-area">
        <div class="left-column">
            <h2>📝 Последовательность (шаг за шагом)</h2>
            <div class="steps-container" id="stepsContainer"></div>
        </div>
        <div class="right-column">
            <h2>🎯 Доступные действия</h2>
            <div class="answers-container" id="answersContainer"></div>
        </div>
    </div>
    
    <div class="control-panel">
        <a href="index.html" class="btn btn-back">🏠 НА ГЛАВНУЮ</a>
        <button class="btn btn-mode" id="modeBtn">🎯 ТРЕНИРОВКА / КОНТРОЛЬ</button>
        <button class="btn btn-check" id="checkBtn">✅ ПРОВЕРИТЬ</button>
        <button class="btn btn-reset" id="resetBtn">🔄 СБРОСИТЬ</button>
        <button class="btn btn-shuffle" id="shuffleBtn">🎲 ПЕРЕМЕШАТЬ</button>
    </div>
    
    <div class="message-area" id="messageArea"></div>
</div>

<script src="data.js"></script>
<script>
    let currentNodeId = 'gearbox';
    let allActions = [];
    let droppedItems = {};
    let stepCount = 0;
    let currentPoints = 0;
    let maxPoints = 0;
    let isControlMode = false;
    let nextId = 1;
    
    let completedNodes = JSON.parse(localStorage.getItem('trainer_completed_nodes') || '{}');
    
    function shuffleArray(arr) {
        const newArr = [...arr];
        for (let i = newArr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
        }
        return newArr;
    }
    
    function initActions() {
        const nodeData = NODES_DATA[currentNodeId];
        nextId = 1;
        const correctWithType = nodeData.correctActions.map(text => ({ text, type: 'correct', used: false, id: nextId++ }));
        const wrongWithType = nodeData.wrongActions.map(text => ({ text, type: 'wrong', used: false, id: nextId++ }));
        allActions = shuffleArray([...correctWithType, ...wrongWithType]);
        stepCount = nodeData.correctActions.length;
        maxPoints = stepCount;
    }
    
    function updatePointsDisplay() {
        document.getElementById('pointsBadge').innerHTML = `⭐ Баллы: ${currentPoints}`;
    }
    
    function updateModeDisplay() {
        const modeBadge = document.getElementById('modeBadge');
        if (isControlMode) {
            modeBadge.innerHTML = '🔒 РЕЖИМ: КОНТРОЛЬ';
            modeBadge.style.background = '#f44336';
        } else {
            modeBadge.innerHTML = '🎯 РЕЖИМ: ТРЕНИРОВКА';
            modeBadge.style.background = '#ff9800';
        }
    }
    
    function getDropZoneClass(step) {
        if (!droppedItems[step]) return '';
        if (isControlMode) return 'filled-neutral';
        return droppedItems[step].type === 'correct' ? 'filled-correct' : 'filled-wrong';
    }
    
    function renderLeftColumn() {
        const container = document.getElementById('stepsContainer');
        container.innerHTML = '';
        for (let i = 1; i <= stepCount; i++) {
            const row = document.createElement('div');
            row.className = 'step-row';
            const dropZoneClass = getDropZoneClass(i);
            row.innerHTML = `
                <div class="step-number">${i}</div>
                <div class="drop-zone ${dropZoneClass}" data-step="${i}">
                    ${droppedItems[i] ? 
                        `<span>${droppedItems[i].text}</span>
                         <button class="remove-btn" onclick="removeFromStep(${i})">✖</button>` : 
                        '⬅️ Перетащите сюда'}
                </div>
            `;
            container.appendChild(row);
            
            const dropZone = row.querySelector('.drop-zone');
            if (!droppedItems[i]) {
                dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
                dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('drag-over'); });
                dropZone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    dropZone.classList.remove('drag-over');
                    const step = parseInt(dropZone.dataset.step);
                    const draggedText = e.dataTransfer.getData('text/plain');
                    if (draggedText) handleDrop(step, draggedText);
                });
            }
        }
    }
    
    function renderRightColumn() {
        const container = document.getElementById('answersContainer');
        container.innerHTML = '';
        const availableActions = allActions.filter(a => !a.used);
        availableActions.forEach((action) => {
            const card = document.createElement('div');
            card.className = `answer-card ${action.used ? 'used' : ''}`;
            card.textContent = action.text;
            if (!action.used) {
                card.setAttribute('draggable', 'true');
                card.addEventListener('dragstart', (e) => {
                    e.dataTransfer.setData('text/plain', action.text);
                    card.classList.add('dragging');
                });
                card.addEventListener('dragend', () => { card.classList.remove('dragging'); });
            } else {
                card.setAttribute('draggable', 'false');
            }
            container.appendChild(card);
        });
    }
    
    function handleDrop(step, actionText) {
        const actionIndex = allActions.findIndex(a => a.text === actionText && !a.used);
        if (actionIndex === -1) { if (!isControlMode) showMessage('❌ Действие уже использовано!', 'error'); return; }
        const action = allActions[actionIndex];
        if (droppedItems[step]) { if (!isControlMode) showMessage(`⚠️ Шаг ${step} уже заполнен`, 'error'); return; }
        
        const isCorrectForThisStep = (action.text === NODES_DATA[currentNodeId].correctActions[step-1]);
        
        if (!isControlMode) {
            if (isCorrectForThisStep) { currentPoints += 1; showMessage(`✅ Шаг ${step}: +1 балл`, 'success'); }
            else { currentPoints -= 1; showMessage(`❌ Шаг ${step}: -1 балл`, 'error'); }
            updatePointsDisplay();
        }
        
        droppedItems[step] = { text: action.text, type: isCorrectForThisStep ? 'correct' : 'wrong' };
        action.used = true;
        renderLeftColumn();
        renderRightColumn();
        
        const filledCount = Object.keys(droppedItems).length;
        if (filledCount === stepCount && !isControlMode) checkSequence();
    }
    
    window.removeFromStep = function(step) {
        const removed = droppedItems[step];
        if (removed) {
            if (!isControlMode) {
                if (removed.type === 'correct') currentPoints -= 1;
                else currentPoints += 1;
                updatePointsDisplay();
            }
            const actionIndex = allActions.findIndex(a => a.text === removed.text);
            if (actionIndex !== -1) allActions[actionIndex].used = false;
            delete droppedItems[step];
            renderLeftColumn();
            renderRightColumn();
            if (!isControlMode) showMessage(`🔄 Шаг ${step} удалён`, '');
        }
    };
    
    function resetAll() {
        initActions();
        droppedItems = {};
        if (!isControlMode) { currentPoints = 0; updatePointsDisplay(); }
        renderLeftColumn();
        renderRightColumn();
        if (!isControlMode) showMessage('🔄 Всё сброшено!', '');
        document.getElementById('statusBadge').innerHTML = '⚡ Статус: не пройден';
        document.getElementById('statusBadge').style.background = '#ffcc00';
        document.getElementById('messageArea').innerHTML = '';
    }
    
    function shuffleAnswers() {
        const usedActionsText = Object.values(droppedItems).map(d => d.text);
        const unusedActions = allActions.filter(a => !a.used);
        const shuffledUnused = shuffleArray(unusedActions);
        const newAllActions = [];
        usedActionsText.forEach(text => {
            const isCorrect = NODES_DATA[currentNodeId].correctActions.includes(text);
            newAllActions.push({ text, type: isCorrect ? 'correct' : 'wrong', used: true, id: nextId++ });
        });
        newAllActions.push(...shuffledUnused);
        allActions = newAllActions;
        renderRightColumn();
        if (!isControlMode) showMessage('🎲 Порядок ответов перемешан!', '');
    }
    
    function showCorrectSequence() {
        const msgArea = document.getElementById('messageArea');
        let html = '<div class="correct-sequence"><strong>📖 Правильная последовательность:</strong><br>';
        NODES_DATA[currentNodeId].correctActions.forEach((action, idx) => { html += `${idx+1}. ${action}<br>`; });
        html += '</div>';
        if (msgArea.innerHTML && !msgArea.innerHTML.includes('Правильная')) msgArea.innerHTML = msgArea.innerHTML + html;
        else msgArea.innerHTML = html;
    }
    
    function checkSequence() {
        const filledCount = Object.keys(droppedItems).length;
        if (filledCount !== stepCount) {
            showMessage(`⚠️ Заполнено ${filledCount} из ${stepCount} шагов`, 'error');
            showCorrectSequence();
            return;
        }
        let correct = true, wrongSteps = [];
        for (let i = 1; i <= stepCount; i++) {
            if (droppedItems[i].text !== NODES_DATA[currentNodeId].correctActions[i-1]) { correct = false; wrongSteps.push(i); }
        }
        if (correct) {
            let finalPoints = isControlMode ? maxPoints : currentPoints;
            if (isControlMode) { currentPoints = maxPoints; updatePointsDisplay(); }
            showMessage(`🎉 ПРАВИЛЬНО! Баллы: ${finalPoints} из ${maxPoints} 🎉`, 'success');
            document.getElementById('statusBadge').innerHTML = '✅ ПРОЙДЕН!';
            document.getElementById('statusBadge').style.background = '#4caf50';
            const history = JSON.parse(localStorage.getItem('trainer_history') || '[]');
            history.push({ date: new Date().toLocaleString(), nodeName: NODES_DATA[currentNodeId].fullName, score: finalPoints, maxScore: maxPoints, mode: isControlMode ? 'контроль' : 'тренировка' });
            localStorage.setItem('trainer_history', JSON.stringify(history));
            completedNodes[currentNodeId] = true;
            localStorage.setItem('trainer_completed_nodes', JSON.stringify(completedNodes));
            renderNodeList();
        } else {
            if (isControlMode) {
                showMessage(`❌ КОНТРОЛЬ НЕ ПРОЙДЕН! Ошибка в шагах: ${wrongSteps.join(', ')}.`, 'error');
                currentPoints = 0; updatePointsDisplay();
            } else {
                showMessage(`❌ Ошибка в шагах: ${wrongSteps.join(', ')}. Баллы: ${currentPoints}`, 'error');
            }
            showCorrectSequence();
            document.getElementById('statusBadge').innerHTML = '❌ НЕ ПРОЙДЕН';
            document.getElementById('statusBadge').style.background = '#f44336';
        }
    }
    
    function toggleMode() {
        isControlMode = !isControlMode;
        updateModeDisplay();
        resetAll();
        if (isControlMode) { currentPoints = 0; updatePointsDisplay(); }
    }
    
    function showMessage(msg, type) {
        const msgArea = document.getElementById('messageArea');
        if (!msg.includes('Правильная последовательность')) msgArea.innerHTML = msg;
        msgArea.className = 'message-area';
        if (type === 'success') msgArea.classList.add('message-success');
        else if (type === 'error') msgArea.classList.add('message-error');
        setTimeout(() => {
            if (msgArea.innerHTML === msg && !msg.includes('Правильная')) { msgArea.innerHTML = ''; msgArea.className = 'message-area'; }
        }, 3000);
    }
    
    function loadNode(nodeId) {
        currentNodeId = nodeId;
        initActions();
        droppedItems = {};
        currentPoints = 0;
        updatePointsDisplay();
        renderLeftColumn();
        renderRightColumn();
        document.getElementById('statusBadge').innerHTML = '⚡ Статус: не пройден';
        document.getElementById('statusBadge').style.background = '#ffcc00';
        document.getElementById('messageArea').innerHTML = '';
        renderNodeList();
    }
    
    function renderNodeList() {
        const container = document.getElementById('nodeList');
        container.innerHTML = '';
        for (const [id, data] of Object.entries(NODES_DATA)) {
            const btn = document.createElement('button');
            btn.className = 'node-btn';
            if (id === currentNodeId) btn.classList.add('active');
            if (completedNodes[id]) btn.classList.add('completed');
            btn.textContent = data.name;
            btn.onclick = () => loadNode(id);
            container.appendChild(btn);
        }
    }
    
    renderNodeList();
    initActions();
    renderLeftColumn();
    renderRightColumn();
    updatePointsDisplay();
    updateModeDisplay();
    
    document.getElementById('checkBtn').addEventListener('click', checkSequence);
    document.getElementById('resetBtn').addEventListener('click', resetAll);
    document.getElementById('shuffleBtn').addEventListener('click', shuffleAnswers);
    document.getElementById('modeBtn').addEventListener('click', toggleMode);
</script>
</body>
</html>
