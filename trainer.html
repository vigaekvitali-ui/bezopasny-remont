<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Тренажёр - Безопасный ремонт? ВСЕГДА!!!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a4d2a 0%, #0e3a1f 100%);
            min-height: 100vh;
            padding: 12px;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        .header {
            background: #ffcc00;
            border-radius: 20px;
            padding: 12px 16px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header h1 {
            font-size: 1.1rem;
            color: #1a4d2a;
        }

        .back-btn {
            background: #1a4d2a;
            color: white;
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.85rem;
        }

        .score-area {
            background: #1a4d2a;
            color: #ffcc00;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
        }

        .trainer-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .tractor-container {
            background: white;
            border-radius: 20px;
            padding: 12px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .tractor-img {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .zone-hint {
            font-size: 0.75rem;
            color: #666;
            margin-top: 10px;
            background: #f5f5f5;
            padding: 6px;
            border-radius: 20px;
        }

        /* Панель вопроса — сделана крупнее и удобнее для телефона */
        .question-panel {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            margin-top: 5px;
        }

        .question-text {
            font-size: 1.2rem;
            font-weight: bold;
            color: #1a4d2a;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 2px solid #ffcc00;
            line-height: 1.4;
            white-space: pre-line;
        }

        .answers-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .answer-btn {
            background: #f0f0f0;
            border: 2px solid #ddd;
            border-radius: 14px;
            padding: 14px 12px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
            text-align: left;
            font-family: inherit;
            line-height: 1.3;
            -webkit-tap-highlight-color: transparent;
        }

        .answer-btn:active {
            transform: scale(0.98);
        }

        .answer-btn.correct-highlight {
            background: #4caf50;
            color: white;
            border-color: #2e7d32;
        }

        .answer-btn.wrong-highlight {
            background: #f44336;
            color: white;
            border-color: #c62828;
        }

        .answer-btn:disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }

        .feedback {
            background: #e8f5e9;
            border-left: 5px solid #4caf50;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .feedback.wrong {
            background: #ffebee;
            border-left-color: #f44336;
        }

        .next-btn, .finish-btn {
            background: #ffcc00;
            color: #1a4d2a;
            border: none;
            padding: 14px 20px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
            transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .finish-btn {
            background: #1a4d2a;
            color: #ffcc00;
        }

        .next-btn:active, .finish-btn:active {
            transform: scale(0.98);
        }

        @media (max-width: 600px) {
            body { padding: 8px; }
            .question-text { font-size: 1rem; }
            .answer-btn { padding: 12px 10px; font-size: 0.85rem; }
            .feedback { font-size: 0.8rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 ТРЕНАЖЁР ПО БЕЗОПАСНОСТИ</h1>
            <div style="display: flex; gap: 10px; align-items: center;">
                <div class="score-area">⭐ <span id="scoreValue">0</span></div>
                <a href="index.html" class="back-btn">← На главную</a>
            </div>
        </div>

        <div class="trainer-wrapper">
            <div class="tractor-container">
                <img src="tractor.jpg" alt="Трактор МТЗ" class="tractor-img" id="tractorImg" style="width:100%; border-radius:12px;" usemap="#tractorMap">
                <map name="tractorMap" id="tractorMap"></map>
                <div class="zone-hint">💡 Нажмите на любую часть трактора — появится вопрос по безопасности</div>
            </div>

            <div class="question-panel" id="questionPanel">
                <div class="question-text" id="questionText">📌 Нажмите на трактор, чтобы начать</div>
                <div class="answers-grid" id="answersGrid"></div>
                <div class="feedback" id="feedback"></div>
                <button class="next-btn" id="nextBtn" style="display: none;">➡️ Следующий вопрос</button>
                <button class="finish-btn" id="finishBtn" style="display: none;">🏁 Завершить тренажёр</button>
            </div>
        </div>
    </div>

    <script>
        // Данные о зонах и вопросах (координаты под вашу картинку)
        const zones = [
            {
                id: "wheel",
                name: "Колесо",
                coords: [150, 350, 280, 480],
                question: "Что необходимо сделать ПЕРЕД началом разборки колеса трактора?",
                options: [
                    "Подкачать шину до максимального давления",
                    "Установить противооткатные упоры и вывесить мост на козелки ✅",
                    "Слить масло из двигателя",
                    "Отключить фары и поворотники"
                ],
                correct: 1,
                explanation: "Перед разборкой колеса нужно: 1) установить противооткатные упоры, 2) вывесить мост на надёжные козелки, 3) снять давление в шине."
            },
            {
                id: "hitch",
                name: "Навеска",
                coords: [800, 400, 950, 550],
                question: "Какое действие ОБЯЗАТЕЛЬНО перед отсоединением навесного оборудования?",
                options: [
                    "Поднять навеску в верхнее положение",
                    "Опустить навеску на землю и зафиксировать гидроцилиндры цепями ✅",
                    "Увеличить обороты двигателя",
                    "Отключить стояночный тормоз"
                ],
                correct: 1,
                explanation: "Навеску нужно опустить на землю, снять давление в гидросистеме и зафиксировать гидроцилиндры страховочными цепями."
            },
            {
                id: "cabin",
                name: "Кабина",
                coords: [450, 180, 600, 320],
                question: "Что нужно проверить в кабине перед началом ремонта трактора?",
                options: [
                    "Работоспособность магнитолы",
                    "Рычаг КПП в нейтрали, стояночный тормоз затянут ✅",
                    "Наличие аптечки",
                    "Чистоту стёкол"
                ],
                correct: 1,
                explanation: "Рычаг КПП должен быть в нейтральном положении, стояночный тормоз затянут, чтобы трактор не начал движение."
            },
            {
                id: "engine",
                name: "Двигатель",
                coords: [350, 100, 580, 220],
                question: "Что из перечисленного НУЖНО сделать перед разборкой двигателя?",
                options: [
                    "Завести двигатель и прогреть",
                    "Слить масло и топливо, отключить АКБ ✅",
                    "Проверить уровень охлаждающей жидкости",
                    "Снять воздушный фильтр"
                ],
                correct: 1,
                explanation: "Обязательно: слить масло и топливо, отключить аккумулятор, дать двигателю остыть."
            },
            {
                id: "brakes",
                name: "Тормозная система",
                coords: [650, 350, 780, 480],
                question: "Как обезопасить себя при работе с пневматической тормозной системой?",
                options: [
                    "Повысить давление в системе",
                    "Сбросить остаточное давление, перекрыть краны ✅",
                    "Отключить компрессор",
                    "Снять тормозные камеры"
                ],
                correct: 1,
                explanation: "Перед разборкой нужно сбросить остаточное давление в пневмосистеме и перекрыть краны к тормозным камерам."
            },
            {
                id: "steering",
                name: "Рулевое управление",
                coords: [480, 280, 620, 380],
                question: "Что важно сделать перед разборкой рулевого управления?",
                options: [
                    "Проверить давление в шинах",
                    "Зафиксировать колёса, слить масло из ГУР ✅",
                    "Отрегулировать развал-схождение",
                    "Снять рулевое колесо"
                ],
                correct: 1,
                explanation: "Нужно зафиксировать колёса в прямом положении, слить масло из гидроусилителя, отключить насос ГУР."
            },
            {
                id: "electric",
                name: "Электрооборудование",
                coords: [300, 200, 450, 290],
                question: "Первое действие при любом ремонте электрооборудования трактора?",
                options: [
                    "Проверить заряд аккумулятора",
                    "Отключить клемму «минус» аккумулятора ✅",
                    "Включить ближний свет",
                    "Проверить предохранители"
                ],
                correct: 1,
                explanation: "Всегда первым делом отключаем минусовую клемму АКБ, чтобы избежать короткого замыкания."
            }
        ];

        let currentZone = null;
        let answered = false;
        let totalScore = 0;
        let answeredZones = new Set();
        let currentZoneData = null;

        const questionText = document.getElementById('questionText');
        const answersGrid = document.getElementById('answersGrid');
        const feedbackDiv = document.getElementById('feedback');
        const nextBtn = document.getElementById('nextBtn');
        const finishBtn = document.getElementById('finishBtn');
        const scoreSpan = document.getElementById('scoreValue');

        function updateScoreUI() {
            scoreSpan.innerText = totalScore;
        }

        function saveResultToHistory() {
            const maxPossible = zones.length * 10;
            const history = JSON.parse(localStorage.getItem('trainer_history') || '[]');
            history.push({
                date: new Date().toLocaleString(),
                score: totalScore,
                maxScore: maxPossible
            });
            localStorage.setItem('trainer_history', JSON.stringify(history));
        }

        function finishTrainer() {
            if (answeredZones.size < zones.length) {
                if (confirm(`Вы ответили только на ${answeredZones.size} из ${zones.length} зон. Завершить досрочно?`)) {
                    saveResultToHistory();
                    alert(`Тренажёр завершён! Результат: ${totalScore} из ${zones.length * 10} баллов.`);
                    window.location.href = 'index.html';
                }
            } else {
                saveResultToHistory();
                alert(`Поздравляем! Вы ответили на все вопросы!\nРезультат: ${totalScore} из ${zones.length * 10} баллов.`);
                window.location.href = 'index.html';
            }
        }

        // Прокрутка к панели вопросов (для телефона)
        function scrollToQuestion() {
            const panel = document.getElementById('questionPanel');
            if (panel) {
                panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        function showQuestion(zone) {
            if (answeredZones.has(zone.id)) {
                feedbackDiv.innerHTML = `<div style="color:#ff9800;">⚠️ Вы уже отвечали на этот вопрос. Выберите другую зону.</div>`;
                feedbackDiv.className = 'feedback';
                questionText.innerText = `🔁 ${zone.name} (уже пройдено)`;
                answersGrid.innerHTML = '';
                nextBtn.style.display = 'none';
                finishBtn.style.display = 'block';
                return;
            }

            currentZone = zone;
            currentZoneData = zone;
            answered = false;
            
            questionText.innerText = `📍 Зона: ${zone.name}\n${zone.question}`;
            
            let btnsHtml = '';
            zone.options.forEach((opt, idx) => {
                btnsHtml += `<button class="answer-btn" data-opt-index="${idx}">${String.fromCharCode(65+idx)}. ${opt}</button>`;
            });
            answersGrid.innerHTML = btnsHtml;
            
            document.querySelectorAll('.answer-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    if (answered) return;
                    const selectedIdx = parseInt(btn.dataset.optIndex);
                    handleAnswer(selectedIdx);
                });
            });
            
            feedbackDiv.innerHTML = '';
            feedbackDiv.className = 'feedback';
            nextBtn.style.display = 'none';
            finishBtn.style.display = 'none';
            
            // Прокручиваем к вопросам (важно для телефона!)
            scrollToQuestion();
        }

        function handleAnswer(selectedIdx) {
            if (answered) return;
            answered = true;
            
            const isCorrect = (selectedIdx === currentZone.correct);
            const zone = currentZone;
            
            if (isCorrect) {
                totalScore += 10;
                updateScoreUI();
                feedbackDiv.innerHTML = `✅ ПРАВИЛЬНО! +10 баллов.<br><br>📖 Пояснение: ${zone.explanation}`;
                feedbackDiv.className = 'feedback';
                document.querySelectorAll('.answer-btn').forEach((btn, idx) => {
                    btn.disabled = true;
                    if (idx === zone.correct) {
                        btn.classList.add('correct-highlight');
                    }
                });
            } else {
                feedbackDiv.innerHTML = `❌ НЕПРАВИЛЬНО. Правильный ответ: ${String.fromCharCode(65+zone.correct)}. ${zone.options[zone.correct]}<br><br>📖 Пояснение: ${zone.explanation}`;
                feedbackDiv.className = 'feedback wrong';
                document.querySelectorAll('.answer-btn').forEach((btn, idx) => {
                    btn.disabled = true;
                    if (idx === zone.correct) {
                        btn.classList.add('correct-highlight');
                    }
                    if (idx === selectedIdx) {
                        btn.classList.add('wrong-highlight');
                    }
                });
            }
            
            answeredZones.add(zone.id);
            
            if (answeredZones.size < zones.length) {
                nextBtn.style.display = 'block';
                finishBtn.style.display = 'none';
            } else {
                nextBtn.style.display = 'none';
                finishBtn.style.display = 'block';
            }
        }

        function resetForNext() {
            questionText.innerText = '📌 Нажмите на следующую зону трактора';
            answersGrid.innerHTML = '';
            feedbackDiv.innerHTML = '';
            feedbackDiv.className = 'feedback';
            nextBtn.style.display = 'none';
            finishBtn.style.display = (answeredZones.size >= zones.length) ? 'block' : 'none';
            currentZone = null;
        }

        function setupImageMap() {
            const map = document.getElementById('tractorMap');
            map.innerHTML = '';
            zones.forEach(zone => {
                const area = document.createElement('area');
                area.shape = 'rect';
                area.coords = zone.coords.join(',');
                area.alt = zone.name;
                area.title = zone.name;
                area.style.cursor = 'pointer';
                area.addEventListener('click', (e) => {
                    e.preventDefault();
                    if (currentZone === null || answered === false || answeredZones.has(zone.id)) {
                        showQuestion(zone);
                    } else {
                        feedbackDiv.innerHTML = `<div style="color:#ff9800;">⚠️ Сначала ответьте на текущий вопрос или нажмите "Следующий вопрос".</div>`;
                        scrollToQuestion();
                    }
                });
                map.appendChild(area);
            });
        }

        nextBtn.addEventListener('click', () => {
            resetForNext();
        });
        
        finishBtn.addEventListener('click', () => {
            finishTrainer();
        });

        const tractorImg = document.getElementById('tractorImg');
        tractorImg.onload = function() {
            setupImageMap();
        };
        if (tractorImg.complete) {
            setupImageMap();
        }
        
        updateScoreUI();
        resetForNext();
    </script>
</body>
</html>
